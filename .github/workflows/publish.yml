# This workflow builds the Docker image and publishes it to GitHub Container Registry
# on every push to any branch and on semver tag pushes.
# It also supports manual trigger via workflow_dispatch.
# It does NOT publish on pull_request (only on push to branches/tags).
#
# Permission notes:
# - contents:read is needed to checkout the repo
# - packages:write is needed to push to GHCR
# - For PR triggers only (which we skip), we'd need pull_request:write

name: Publish Docker image

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  workflow_dispatch:
    # No inputs needed

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
